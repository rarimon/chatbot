<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnnoRokom Bigganbaksho</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; background: transparent !important; overflow: hidden; }
        #chat-container { position: fixed; bottom: 20px; right: 20px; width: 360px; height: 540px; background: #ffffff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15); display: flex; flex-direction: column; overflow: hidden; border: 1px solid #eaeaea; z-index: 999999; }
        #chat-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 16px 20px; font-weight: 700; font-size: 16px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        #chat-header::before { content: ''; display: inline-block; width: 9px; height: 9px; background-color: #4ade80; border-radius: 50%; margin-right: 10px; }
        #messages { flex: 1; padding: 15px 20px; overflow-y: auto; background: #f8fafc; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 10px 14px; border-radius: 14px; font-size: 14px; max-width: 80%; line-height: 1.4; word-wrap: break-word; }
        .user { background: #667eea; color: white; align-self: flex-end; border-bottom-right-radius: 3px; }
        .ai { background: #ffffff; color: #1e293b; align-self: flex-start; border-bottom-left-radius: 3px; border: 1px solid #e2e8f0; }

        .typing-indicator { display: flex; align-items: center; gap: 4px; padding: 10px 14px; background: #ffffff; border-radius: 14px; border: 1px solid #e2e8f0; align-self: flex-start; }
        .typing-dot { width: 7px; height: 7px; background-color: #94a3b8; border-radius: 50%; animation: blink 1.4s infinite both; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }

        #input-area { padding: 12px 15px; display: flex; align-items: center; border-top: 1px solid #eaeaea; background: white; }
        input { flex: 1; padding: 10px 14px; border: 1px solid #cbd5e1; border-radius: 25px; outline: none; font-size: 14px; }
        button { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; width: 38px; height: 38px; border-radius: 50%; margin-left: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-header">Bigganbaksho Support</div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="আপনার প্রশ্ন লিখুন..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    let sessionId = localStorage.getItem('chat_session_id') || ('user_' + Math.random().toString(36).substr(2, 9));
    localStorage.setItem('chat_session_id', sessionId);

    const input = document.getElementById('userInput');
    const messages = document.getElementById('messages');

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }

    function showTyping() {
        const div = document.createElement('div');
        div.className = 'typing-indicator';
        div.id = 'typing';
        div.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }

    function hideTyping() {
        const el = document.getElementById('typing');
        if (el) el.remove();
    }

    async function sendMessage() {
        const userText = input.value.trim();
        if (!userText) return;

        // ইউজারের মেসেজ স্ক্রিনে দেখানো
        messages.innerHTML += `<div class="msg user">${userText}</div>`;
        input.value = '';
        messages.scrollTop = messages.scrollHeight;

        showTyping();

        try {
            const response = await fetch('https://n8n-production-fa465.up.railway.app/webhook-test/77468a73-41b3-41be-869c-16cad0bcfc19', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionId: sessionId, message: userText })
            });

            hideTyping();

            if (response.ok) {
                const aiText = await response.text();
                messages.innerHTML += `<div class="msg ai">${aiText || 'উত্তর পাওয়া যায়নি'}</div>`;
            } else {
                messages.innerHTML += `<div class="msg ai" style="color: red;">সার্ভার রেসপন্স করতে সমস্যা করছে!</div>`;
            }
        } catch (error) {
            hideTyping();
            messages.innerHTML += `<div class="msg ai" style="color: red;">কানেকশন এরর!</div>`;
        }

        messages.scrollTop = messages.scrollHeight;
    }
</script>
</body>
</html>
