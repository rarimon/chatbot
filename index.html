<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OnnoRokom Bigganbaksho</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: transparent !important;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #chat-container {
            width: 100%;
            height: 100%;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        @media (max-width: 480px) {
            #chat-container {
                border-radius: 0;
                border: none;
                height: 100vh;
            }
        }

        #chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 20px;
            font-weight: 700;
            font-size: 16px;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }

        #chat-header::before {
            content: '';
            display: inline-block;
            width: 9px;
            height: 9px;
            background-color: #4ade80;
            border-radius: 50%;
            margin-right: 10px;
        }

        #messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            gap: 12px;
            -webkit-overflow-scrolling: touch;
        }

        .msg {
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 14px;
            max-width: 85%;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user {
            background: #667eea;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 3px;
            white-space: pre-wrap;
        }

        .ai {
            background: #ffffff;
            color: #1e293b;
            align-self: flex-start;
            border-bottom-left-radius: 3px;
            border: 1px solid #e2e8f0;
        }

        .ai p { margin: 0 0 8px 0; }
        .ai p:last-child { margin-bottom: 0; }
        .ai ul, .ai ol { margin: 5px 0; padding-left: 20px; }
        .ai li { margin-bottom: 4px; }
        .ai strong { color: #4338ca; }

        .msg img, .preview-thumb img {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 4px;
            display: block;
        }

        /* ইনপুট বক্সের উপরে ইমেজ প্রিভিউ কন্টেইনার */
        #preview-container {
            display: none;
            padding: 8px 12px;
            background: #f1f5f9;
            border-top: 1px solid #e2e8f0;
            gap: 8px;
            overflow-x: auto;
            flex-shrink: 0;
            align-items: center;
        }

        .preview-thumb {
            position: relative;
            width: 50px;
            height: 50px;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #cbd5e1;
            flex-shrink: 0;
            background: #fff;
        }

        .preview-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            margin: 0;
        }

        .preview-remove {
            position: absolute;
            top: 2px;
            right: 2px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: none;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .typing-indicator { display: flex; align-items: center; gap: 4px; padding: 10px 14px; background: #ffffff; border-radius: 14px; border: 1px solid #e2e8f0; align-self: flex-start; }
        .typing-dot { width: 7px; height: 7px; background-color: #94a3b8; border-radius: 50%; animation: blink 1.4s infinite both; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }

        #input-area {
            padding: 12px 15px;
            display: flex;
            align-items: center;
            border-top: 1px solid #e2e8f0;
            background: white;
            gap: 10px;
            flex-shrink: 0;
            position: relative;
            z-index: 10;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
            background: #ffffff;
        }

        input[type="text"]:focus {
            border-color: #667eea;
        }

        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-flex;
            cursor: pointer;
        }

        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        .file-icon, .send-btn {
            background: #f1f5f9;
            color: #475569;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .file-icon:hover, .send-btn:hover {
            background: #e2e8f0;
        }

        .send-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-header">Bigganbaksho Support</div>
    <div id="messages"></div>

    <!-- ইনপুট বক্সের ঠিক ওপরে ইমেজ প্রিভিউ দেখানোর জায়গা -->
    <div id="preview-container"></div>

    <div id="input-area">
        <div class="upload-btn-wrapper" title="একাধিক ছবি আপলোড করুন">
            <button class="file-icon">📎</button>
            <input type="file" id="fileInput" accept="image/*" multiple onchange="handleFileUpload(event)">
        </div>

        <input type="text" id="userInput" placeholder="আপনার প্রশ্ন লিখুন..." onkeypress="if(event.key === 'Enter') send()">

        <button class="send-btn" onclick="send()">➤</button>
    </div>
</div>

<script>
    let sessionId = localStorage.getItem('chat_session_id') || ('user_' + Math.random().toString(36).substr(2, 9));
    localStorage.setItem('chat_session_id', sessionId);

    const input = document.getElementById('userInput');
    const messages = document.getElementById('messages');
    const previewContainer = document.getElementById('preview-container');
    let uploadedImages = []; // একাধিক ছবি স্টোর করার অ্যারে

    function handleFileUpload(event) {
        const files = event.target.files;
        if (files && files.length > 0) {
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const reader = new FileReader();
                reader.onload = function(e) {
                    uploadedImages.push(e.target.result);
                    renderPreviews();
                };
                reader.readAsDataURL(file);
            }
        }
        document.getElementById('fileInput').value = ''; // রিসেট যাতে একই ফাইল আবার দেওয়া যায়
    }

    function renderPreviews() {
        previewContainer.innerHTML = '';
        if (uploadedImages.length > 0) {
            previewContainer.style.display = 'flex';
            uploadedImages.forEach((imgSrc, index) => {
                const thumb = document.createElement('div');
                thumb.className = 'preview-thumb';
                thumb.innerHTML = `
                    <img src="${imgSrc}">
                    <button class="preview-remove" onclick="removeImage(${index})">×</button>
                `;
                previewContainer.appendChild(thumb);
            });
        } else {
            previewContainer.style.display = 'none';
        }
    }

    function removeImage(index) {
        uploadedImages.splice(index, 1);
        renderPreviews();
    }

    function showTyping() {
        const div = document.createElement('div');
        div.className = 'typing-indicator';
        div.id = 'typing';
        div.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }

    function hideTyping() {
        const el = document.getElementById('typing');
        if (el) el.remove();
    }

    async function send() {
        const userText = input.value.trim();
        if (!userText && uploadedImages.length === 0) return;

        // চ্যাট উইন্ডোতে ইউজার মেসেজ রেন্ডার করা
        let htmlContent = "";
        uploadedImages.forEach(img => {
            htmlContent += `<img src="${img}" width="150"><br>`;
        });
        if (userText) {
            htmlContent += `<span>${userText}</span>`;
        }
        messages.innerHTML += `<div class="msg user">${htmlContent}</div>`;

        const payloadMessage = userText || "এই ছবিগুলো সম্পর্কে তথ্য দিন।";
        const payloadImages = [...uploadedImages]; // সব ছবি একসাথে পাঠানো হচ্ছে

        // ইনপুট এবং প্রিভিউ ক্লিয়ার করা
        input.value = '';
        uploadedImages = [];
        renderPreviews();
        messages.scrollTop = messages.scrollHeight;

        showTyping();

        try {
            const response = await fetch('https://n8n-production-fa465.up.railway.app/webhook/77468a73-41b3-41be-869c-16cad0bcfc19', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    sessionId: sessionId,
                    message: payloadMessage,
                    image: payloadImages // একাধিক ছবি অ্যারে আকারে n8n এ চলে যাবে
                })
            });

            hideTyping();
            const aiText = await response.text();
            const formattedHtml = marked.parse(aiText || 'উত্তর পাওয়া যায়নি');
            messages.innerHTML += `<div class="msg ai">${formattedHtml}</div>`;

        } catch (e) {
            hideTyping();
            messages.innerHTML += `<div class="msg ai" style="color: red;">সার্ভার এরর!</div>`;
        }
        messages.scrollTop = messages.scrollHeight;
    }
</script>
</body>
</html>
