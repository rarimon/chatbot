<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RA Technology AI</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: transparent; }
        #chat-container { width: 350px; height: 500px; background: #fff; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.2); display: flex; flex-direction: column; overflow: hidden; border: 1px solid #ddd; }
        #chat-header { background: #6366f1; color: white; padding: 15px; font-weight: bold; font-size: 16px; }
        #messages { flex: 1; padding: 15px; overflow-y: auto; background: #f8fafc; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 12px; font-size: 14px; max-width: 80%; }
        .user { background: #6366f1; color: white; align-self: flex-end; }
        .ai { background: #e2e8f0; color: #333; align-self: flex-start; }
        #input-area { padding: 10px; display: flex; border-top: 1px solid #eee; background: white; }
        input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 5px; outline: none; }
        button { background: #6366f1; color: white; border: none; padding: 8px 15px; border-radius: 5px; margin-left: 5px; cursor: pointer; }
    </style>
</head>
<body>
<div id="chat-container">
    <div id="chat-header">RA Technology AI</div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="আপনার প্রশ্ন লিখুন..." onkeypress="if(event.key === 'Enter') send()">
        <button onclick="send()">➤</button>
    </div>
</div>

<script>
    async function send() {
        const input = document.getElementById('userInput');
        const messages = document.getElementById('messages');
        if (!input.value.trim()) return;

        // ইউজারের মেসেজ দেখানো
        messages.innerHTML += `<div class="msg user">${input.value}</div>`;
        const userText = input.value;
        input.value = '';
        messages.scrollTop = messages.scrollHeight;

        try {
            const response = await fetch('https://n8n-production-fa465.up.railway.app/webhook-test/77468a73-41b3-41be-869c-16cad0bcfc19', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: userText })
            });

            // রেসপন্সটি টেক্সট হিসেবে পড়া হচ্ছে
            const aiText = await response.text();

            messages.innerHTML += `<div class="msg ai">${aiText || 'উত্তর পাওয়া যায়নি'}</div>`;
        } catch (e) {
            messages.innerHTML += `<div class="msg ai">সার্ভার কানেকশন এরর!</div>`;
        }
        messages.scrollTop = messages.scrollHeight;
    }
</script>
</body>
</html>
