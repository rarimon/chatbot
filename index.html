<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OnnoRokom Bigganbaksho</title>
    <!-- Marked.js লাইব্রেরি যুক্ত করা হলো যা টেক্সটকে সুন্দর পয়েন্ট ও বোল্ড ফরম্যাটে রূপান্তর করবে -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: transparent !important;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #chat-container {
            width: 100%;
            height: 100%;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        @media (max-width: 480px) {
            #chat-container {
                border-radius: 0;
                border: none;
                height: 100vh;
            }
        }

        #chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 20px;
            font-weight: 700;
            font-size: 16px;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }

        #chat-header::before {
            content: '';
            display: inline-block;
            width: 9px;
            height: 9px;
            background-color: #4ade80;
            border-radius: 50%;
            margin-right: 10px;
        }

        #messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            gap: 12px;
            -webkit-overflow-scrolling: touch;
        }

        .msg {
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 14px;
            max-width: 85%;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user {
            background: #667eea;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 3px;
            white-space: pre-wrap;
        }

        /* AI মেসেজের জন্য সুন্দর পয়েন্ট ও লিস্ট স্টাইলিং */
        .ai {
            background: #ffffff;
            color: #1e293b;
            align-self: flex-start;
            border-bottom-left-radius: 3px;
            border: 1px solid #e2e8f0;
        }

        .ai p { margin: 0 0 8px 0; }
        .ai p:last-child { margin-bottom: 0; }
        .ai ul, .ai ol { margin: 5px 0; padding-left: 20px; }
        .ai li { margin-bottom: 4px; }
        .ai strong { color: #4338ca; }

        .msg img {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 5px;
        }

        .typing-indicator { display: flex; align-items: center; gap: 4px; padding: 10px 14px; background: #ffffff; border-radius: 14px; border: 1px solid #e2e8f0; align-self: flex-start; }
        .typing-dot { width: 7px; height: 7px; background-color: #94a3b8; border-radius: 50%; animation: blink 1.4s infinite both; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }

        #input-area {
            padding: 12px 15px;
            display: flex;
            align-items: center;
            border-top: 1px solid #e2e8f0;
            background: white;
            gap: 10px;
            flex-shrink: 0;
            position: relative;
            z-index: 10;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
            background: #ffffff;
        }

        input[type="text"]:focus {
            border-color: #667eea;
        }

        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-flex;
            cursor: pointer;
        }

        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        .file-icon, .send-btn {
            background: #f1f5f9;
            color: #475569;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .file-icon:hover, .send-btn:hover {
            background: #e2e8f0;
        }

        .send-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-header">Bigganbaksho Support</div>
    <div id="messages"></div>
    <div id="input-area">
        <div class="upload-btn-wrapper" title="ছবি বা ফাইল আপলোড করুন">
            <button class="file-icon">📎</button>
            <input type="file" id="fileInput" accept="image/*" onchange="handleFileUpload(event)">
        </div>

        <input type="text" id="userInput" placeholder="আপনার প্রশ্ন লিখুন..." onkeypress="if(event.key === 'Enter') send()">

        <button class="send-btn" onclick="send()">➤</button>
    </div>
</div>

<script>
    let sessionId = localStorage.getItem('chat_session_id') || ('user_' + Math.random().toString(36).substr(2, 9));
    localStorage.setItem('chat_session_id', sessionId);

    const input = document.getElementById('userInput');
    const messages = document.getElementById('messages');
    let uploadedFileBase64 = null;

    function handleFileUpload(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                uploadedFileBase64 = e.target.result;
                messages.innerHTML += `<div class="msg user">ফাইল যুক্ত করা হয়েছে: <br><img src="${uploadedFileBase64}" width="100"></div>`;
                messages.scrollTop = messages.scrollHeight;
            };
            reader.readAsDataURL(file);
        }
    }

    function showTyping() {
        const div = document.createElement('div');
        div.className = 'typing-indicator';
        div.id = 'typing';
        div.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }

    function hideTyping() {
        const el = document.getElementById('typing');
        if (el) el.remove();
    }

    async function send() {
        const userText = input.value.trim();
        if (!userText && !uploadedFileBase64) return;

        let displayText = userText || "একটি ছবি পাঠানো হয়েছে।";
        messages.innerHTML += `<div class="msg user">${displayText}</div>`;

        const payloadMessage = userText;
        const payloadFile = uploadedFileBase64;

        input.value = '';
        uploadedFileBase64 = null;
        document.getElementById('fileInput').value = '';
        messages.scrollTop = messages.scrollHeight;

        showTyping();

        try {
            const response = await fetch('https://n8n-production-fa465.up.railway.app/webhook/77468a73-41b3-41be-869c-16cad0bcfc19', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    sessionId: sessionId,
                    message: payloadMessage,
                    image: payloadFile
                })
            });

            hideTyping();
            const aiText = await response.text();

            // marked.parse ব্যবহার করে এআই-এর টেক্সটকে সুন্দর ফরম্যাট (বোল্ড, পয়েন্ট বা লিস্ট) এ রূপান্তর করা হলো
            const formattedHtml = marked.parse(aiText || 'উত্তর পাওয়া যায়নি');
            messages.innerHTML += `<div class="msg ai">${formattedHtml}</div>`;

        } catch (e) {
            hideTyping();
            messages.innerHTML += `<div class="msg ai" style="color: red;">সার্ভার এরর!</div>`;
        }
        messages.scrollTop = messages.scrollHeight;
    }
</script>
</body>
</html>
